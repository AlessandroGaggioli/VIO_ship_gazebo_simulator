# RTAB-Map parameters 
# ============================

# These parameters configure RTAB-Map for our specific use case of autonomous exploration 
# with a simulated robot in Gazebo.

# The parameters are organized into categories for clarity, including sensor subscriptions,
# synchronization, frame IDs, and memory/mapping settings. 

# /rtabmap:
#   ros__parameters:
#     #============================================
#     # Frame IDs 
#     #============================================
#     frame_id: 'base_footprint'
#     odom_frame_id: 'odom'
#     map_frame_id: 'map'
#     #============================================
#     # Sensor subscription parameters (booleans)
#     # ============================================
#     subscribe_depth: False
#     subscribe_rgb: False
#     subscribe_scan: False
#     subscribe_stereo: True
#     subscribe_imu: False
#     subscribe_odom: True
#     odom_sensor_sync: False
#     # ===========================================
#     # Synchronization parameters (booleans)
#     # ===========================================
#     approx_sync: True
#     approx_sync_max_interval: 0.04
#     use_sim_time: True
#     wait_imu_to_init: False
#     publish_tf: True
#     wait_for_transform: 1.2
#     tf_delay: 0.05
#     #===========================================
#     # Memory and mapping parameters
#     # ============================================
#     Mem/IncrementalMemory: 'true'
#     Mem/InitWMWithAllNodes: 'true'
#     Grid/Sensor: '1'
#     Grid/FromDepth: 'true'
#     RGBD/CreateOccupancyGrid: 'true'
#     Grid/MaxGroundHeight: '0.02' 
#     Grid/MaxObstacleHeight: '0.5'
#     Grid/MinObstacleHeight: '0.00'
#     Grid/RangeMax: '3.0'
#     Grid/DepthDecimation: '4'
#     Grid/NoiseFilteringRadius: '0.05'
#     Grid/NoiseFilteringMinNeighbors: '2'
#     Optimizer/Slam2D: 'true'

#     # Improve visual odometry robustness when scene texture is weak.
#     Reg/Force3DoF: 'true'
#     RGBD/ProximityBySpace: 'false' #without LiDAR, proximity by space is less effective and can cause false positives in narrow corridors
#     Stereo/MaxDisparity: '256'

#     #Loop Closure parameters
#     Vis/MinInliers: '15'
#     Vis/InlierDistance: '0.05'
#     Vis/MaxDepth: '2.0'
#     Vis/CorType: '1' # 1 (Optical Flow) is more robust for low-texture environments than 0 (Feature-based)


#     #Features extraction parameters 
#     Kp/MaxFeatures: '500'
#     Kp/DetectorStrategy: '0' 
#     Kp/WordsPerImage: '200'
#     Kp/RoiRatios: '0.03 0.03 0.04 0.04'
#     Kp/MaxDepth: '4.0'



/reset_localization:
  ros__parameters:
    use_sim_time: True
    wait_time: 3.0

/stereo_odometry:
  ros__parameters:
    approx_sync: True
    subscribe_rgbd: False
    wait_imu_to_init: False
    frame_id: 'base_footprint'
    odom_frame_id: 'stereo_odom'
    publish_tf: True
    tf_prefix: ''
    wait_for_transform: 0.9
    initial_pose: '0 0 0 0 0 0' # x y z roll pitch yaw
    queue_size: 50
    Odom/Strategy: '0' #[0=Frame-to-Map (F2M) 1=Frame-to-Frame (F2F) 2=Fovis 3=viso2 4=DVO-SLAM 5=ORB_SLAM2 6=OKVIS 7=LOAM 8=MSCKF_VIO 9=VINS-Fusion 10=OpenVINS 11=FLOAM 12=Open3D]

  
