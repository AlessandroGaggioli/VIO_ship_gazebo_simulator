# RTAB-Map parameters 
# ============================

# These parameters configure RTAB-Map for our specific use case of autonomous exploration 
# with a simulated robot in Gazebo.

# The parameters are organized into categories for clarity, including sensor subscriptions,
# synchronization, frame IDs, and memory/mapping settings. 

/**:
  ros__parameters:
    #============================================
    # Frame IDs 
    #============================================
    frame_id: 'base_footprint'
    odom_frame_id: 'odom'
    map_frame_id: 'map'
    #============================================
    # Sensor subscription parameters (booleans)
    # ============================================
    subscribe_depth: False
    subscribe_rgb: False
    subscribe_scan: False
    subscribe_stereo: True
    subscribe_imu: False
    subscribe_odom: True
    # ===========================================
    # Synchronization parameters (booleans)
    # ===========================================
    approx_sync: True
    approx_sync_max_interval: 0.01
    use_sim_time: True
    wait_imu_to_init: False
    publish_tf: True
    wait_for_transform: 0.5
    tf_delay: 0.05
    #===========================================
    # Memory and mapping parameters (strings)
    # ============================================
    Mem/IncrementalMemory: 'true'
    Mem/InitWMWithAllNodes: 'true'
    Grid/Sensor: '1'
    Grid/FromDepth: 'true'
    RGBD/CreateOccupancyGrid: 'true'
    Grid/MaxGroundHeight: '0.05'
    Grid/MinObstacleHeight: '0.5'
    Grid/RangeMax: '5.0'  

reset_localization:
  ros__parameters:
    use_sim_time: True
    wait_time: 3.0

stereo_odometry:
  ros__parameters:
    publish_tf: True
    odom_frame_id: 'odom'
    frame_id: 'base_footprint'
    wait_for_transform: 0.2