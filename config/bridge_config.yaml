# bridge_config.yaml 
# bridge from Gazebo topic to ROS2 topic bridge configuration

# ROS Clock
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
  lazy: false

#----------------------------------------------
# SHIP  CAMERA TOPICS
#----------------------------------------------

  # first internal Camera gazebo
- ros_topic_name: /camera/first_int_corridor_camera/image
  gz_topic_name: /world/ship_world/model/ship_corridor_dynamic/link/first_int_corridor_camera_link/sensor/first_int_corridor_camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  lazy: false

  # second internal Camera gazebo
- ros_topic_name: /camera/second_int_corridor_camera/image
  gz_topic_name: /world/ship_world/model/ship_corridor_dynamic/link/second_int_corridor_camera_link/sensor/second_int_corridor_camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  lazy: false

  # external camera gazebo
- ros_topic_name: /camera/ext_corridor_camera/image
  gz_topic_name: /world/ship_world/model/ship_corridor_dynamic/link/ext_corridor_camera_link/sensor/ext_corridor_camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  lazy: false

# ---------------------------------------------
# STEREO CAMERAS (VIO)
# ---------------------------------------------
# Camera Left . image 
- ros_topic_name: /camera/left/image_raw
  gz_topic_name: /camera/left/image_raw
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  lazy: false

# Camera Left - camera info 
- ros_topic_name: /camera/left/camera_info
  gz_topic_name: /camera/left/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
  lazy: false

# Camera Right - image 
- ros_topic_name: /camera/right/image_raw
  gz_topic_name: /camera/right/image_raw
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  lazy: false

# Camera Right - camera info 
- ros_topic_name: /camera/right/camera_info
  gz_topic_name: /camera/right/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
  lazy: false

#----------------------------------------------
# TF turtlebot3
#----------------------------------------------
# Disabled on purpose: Gazebo ground-truth TF publishes odom->base_footprint,
# which conflicts with stereo_odometry TF (stereo_odom->base_footprint).
# Keep a single TF owner for base_footprint.
# - ros_topic_name: /tf
#   gz_topic_name: /model/turtlebot3_waffle/tf
#   ros_type_name: tf2_msgs/msg/TFMessage
#   gz_type_name: gz.msgs.Pose_V
#   direction: GZ_TO_ROS
#   lazy: false

# ---------------------------------------------
# ODOMETRY AND CMD_VEL 
# ---------------------------------------------
# Odometry (wheel odometry turtlebot3)
- ros_topic_name: /robot/odom
  gz_topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS
  lazy: false

  # IMU robot - turtlebot3
- ros_topic_name: /robot/imu/raw
  gz_topic_name: /model/turtlebot3_waffle/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS
  lazy: false 

  # IMU ship 
- ros_topic_name: /ship/imu/raw
  gz_topic_name: /world/ship_world/model/ship_corridor_dynamic/link/CoG_link/sensor/ship_imu/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS
  lazy: false

# CMD_VEL
- ros_topic_name: /cmd_vel
  gz_topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ
  lazy: false

# JointStates 
- ros_topic_name: /joint_states
  gz_topic_name: /joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS
  lazy: false